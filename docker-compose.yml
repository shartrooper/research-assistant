services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-secret}
    command: redis-server --requirepass ${REDIS_PASSWORD:-secret}

  concierge:
    build: 
      context: .
      dockerfile: Dockerfile
    # The default ENTRYPOINT in your Dockerfile is already ["./concierge"]
    # Add your required environment variables here
    environment:
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-secret}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - CSE_API_KEY=${CSE_API_KEY}
      - CSE_CX=${CSE_CX}
    depends_on:
      - redis

  researcher:
    build: 
      context: .
      dockerfile: Dockerfile
    # Override the entrypoint to run the researcher binary instead
    entrypoint: ["./researcher"]
    # Add your required environment variables here
    environment:
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-secret}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - CSE_API_KEY=${CSE_API_KEY}
      - CSE_CX=${CSE_CX}
    depends_on:
      - redis
